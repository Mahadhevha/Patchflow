steps:
  - name: ubuntu
    entrypoint: bash
    args:
      - -c
      - |
        echo "_VITE_API_KEY=${_VITE_API_KEY}"
        echo "_VITE_AUTH_DOMAIN=${_VITE_AUTH_DOMAIN}"

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "PatchFlow/Dockerfile",
        "--build-arg",
        "VITE_API_KEY=${_VITE_API_KEY}",
        "--build-arg",
        "VITE_AUTH_DOMAIN=${_VITE_AUTH_DOMAIN}",
        "--build-arg",
        "VITE_PROJECT_ID=${_VITE_PROJECT_ID}",
        "--build-arg",
        "VITE_STORAGE_BUCKET=${_VITE_STORAGE_BUCKET}",
        "--build-arg",
        "VITE_MESSAGING_SENDER_ID=${_VITE_MESSAGING_SENDER_ID}",
        "--build-arg",
        "VITE_APP_ID=${_VITE_APP_ID}",
        "--build-arg",
        "VITE_BACKEND_BASE_URL=${_VITE_BACKEND_BASE_URL}",
        "--build-arg",
        "VITE_GITHUB_CLIENT_ID=${_VITE_GITHUB_CLIENT_ID}",
        "-t",
        "${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${REPO_NAME}",
        "PatchFlow"
      ]

images:
  - "${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${REPO_NAME}"

options:
  logging: CLOUD_LOGGING_ONLY